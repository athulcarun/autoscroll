<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
    }

    #controls {
        position: fixed;
        top: 0;
        width: 100%;
        background: #222;
        padding: 10px;
        box-sizing: border-box;
        z-index: 10;
    }

    textarea {
        width: 100%;
        height: 120px;
        margin-bottom: 10px;
        font-family: monospace;
    }

    button, input[type="range"] {
        margin: 5px;
    }

    #viewer {
        position: absolute;
        top: 180px;
        width: 100%;
        height: calc(100vh - 180px);
        overflow: hidden;
    }

    #content {
        position: absolute;
        width: 100%;
    }

    pre {
        font-family: monospace;
        font-size: 18px;
        white-space: pre;
    }
</style>
</head>

<body>

<div id="controls">
    <textarea id="inputText" placeholder="Paste your song / text here..."></textarea>
    <br>

    <button onclick="loadContent()">Load</button>
    <button onclick="startScroll()">Start</button>
    <button onclick="stopScroll()">Stop</button>
    <button onclick="resetScroll()">Reset</button>

    <br>

    Speed:
    <button onclick="changeSpeed(-0.05)">-</button>
    <input type="range" id="speedSlider" min="0.01" max="5" step="0.01" value="1">
    <button onclick="changeSpeed(0.05)">+</button>

    <span id="speedDisplay">1.00</span>
</div>

<div id="viewer">
    <div id="content">
        <pre id="displayText"></pre>
    </div>
</div>

<script>
let speed = 1;
let isScrolling = false;
let position = 0;

const content = document.getElementById("content");
const viewer = document.getElementById("viewer");
const slider = document.getElementById("speedSlider");
const speedDisplay = document.getElementById("speedDisplay");

function loadContent() {
    const text = document.getElementById("inputText").value;
    document.getElementById("displayText").textContent = text;
    resetScroll();
}

function startScroll() {
    if (!isScrolling) {
        isScrolling = true;
        scroll();
    }
}

function stopScroll() {
    isScrolling = false;
}

function resetScroll() {
    position = viewer.offsetHeight;
    content.style.top = position + "px";
}

function changeSpeed(delta) {
    speed = Math.max(0.01, Math.min(5, speed + delta));
    slider.value = speed;
    speedDisplay.textContent = speed.toFixed(2);
}

slider.addEventListener("input", () => {
    speed = parseFloat(slider.value);
    speedDisplay.textContent = speed.toFixed(2);
});

function scroll() {
    if (!isScrolling) return;

    position -= speed;
    content.style.top = position + "px";

    if (position + content.offsetHeight < 0) {
        resetScroll();
    }

    requestAnimationFrame(scroll);
}

// initialize
speedDisplay.textContent = speed.toFixed(2);
resetScroll();
</script>

</body>
</html>
